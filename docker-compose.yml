version: '3.8'

services:
  db:
    # Строгое семантическое версионирование для стабильности
    image: postgres:15.5-alpine
    container_name: aibot_postgres
    restart: unless-stopped
    # Пробрасываем наши креды из существующего .env файла
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    # Строгое семантическое версионирование
    image: redis:7.2.3-alpine
    container_name: aibot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: